# Server Configuration
server.port=9101
server.address=127.0.0.1

# H2 Database Configuration
# CHARACTER_SET=UTF8 is not supported in H2 2.x, using spring.sql.init.encoding instead
spring.datasource.url=jdbc:h2:mem:sqltutor;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# SQL Initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.encoding=UTF-8
spring.sql.init.continue-on-error=true

# JOOQ Configuration
spring.jooq.sql-dialect=h2

# Spring AI Configuration
spring.ai.openai.api-key=${OPENAI_API_KEY:dummy-key-to-prevent-crash}
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration

# CORS Configuration
spring.mvc.cors.allowed-origins=*

# Encoding (Aggressive UTF-8)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
spring.http.encoding.force-response=true
spring.messages.encoding=UTF-8
